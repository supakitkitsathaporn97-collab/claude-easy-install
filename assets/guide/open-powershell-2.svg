<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 200" role="img" aria-label="Step 2 - type PowerShell in the search box">
  <title>Step 2 — type PowerShell / Bước 2 — gõ chữ PowerShell</title>
  <defs>
    <linearGradient id="g2-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C212C"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="198" rx="16" fill="url(#g2-tile)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <circle cx="58" cy="100" r="26" fill="#E8B04B"/>
  <text x="58" y="111" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#12151C">2</text>

  <text x="104" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#E8ECF4">Gõ chữ:  PowerShell</text>
  <text x="104" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#8A93A6">Ô tìm kiếm tự mở ra — chỉ cần gõ, không cần bấm vào đâu cả.</text>
  <text x="104" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-style="italic" fill="#5C6577">Just type "PowerShell" — the search box opens by itself.</text>

  <!-- simplified search UI (self-drawn, not a real screenshot) -->
  <g transform="translate(492,44)">
    <rect x="0" y="0" width="264" height="118" rx="12" fill="#20242C" stroke="rgba(255,255,255,0.12)"/>
    <!-- search field -->
    <rect x="14" y="14" width="236" height="30" rx="15" fill="#12151C" stroke="#2FD6C3" stroke-width="1.5"/>
    <circle cx="32" cy="29" r="6" fill="none" stroke="#8A93A6" stroke-width="2"/>
    <line x1="36.5" y1="33.5" x2="41" y2="38" stroke="#8A93A6" stroke-width="2" stroke-linecap="round"/>
    <text x="50" y="34" font-family="Consolas, monospace" font-size="14" fill="#E8ECF4">PowerShell</text>
    <rect x="138" y="20" width="2" height="18" fill="#2FD6C3"/>
    <!-- top result -->
    <rect x="14" y="56" width="236" height="34" rx="8" fill="#2A3040"/>
    <rect x="22" y="62" width="22" height="22" rx="5" fill="#012456"/>
    <text x="27" y="79" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#E8ECF4">&gt;_</text>
    <text x="52" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#E8ECF4">Windows PowerShell</text>
    <text x="14" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Kết quả đầu tiên / best match ↑</text>
  </g>
</svg>
