<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 200" role="img" aria-label="Step 3 - press Enter, a blue window opens">
  <title>Step 3 — press Enter / Bước 3 — nhấn Enter</title>
  <defs>
    <linearGradient id="g3-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C212C"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="198" rx="16" fill="url(#g3-tile)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <circle cx="58" cy="100" r="26" fill="#E8B04B"/>
  <text x="58" y="111" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#12151C">3</text>

  <text x="104" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#E8ECF4">Nhấn Enter — cửa sổ xanh đậm mở ra</text>
  <text x="104" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#8A93A6">Cửa sổ chữ trắng nền xanh đậm = PowerShell. Bạn làm đúng rồi!</text>
  <text x="104" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-style="italic" fill="#5C6577">Press Enter — a dark-blue window appears. That's PowerShell.</text>

  <!-- Enter key + simplified PowerShell window -->
  <g transform="translate(470,50)">
    <rect x="0" y="34" width="66" height="30" rx="6" fill="#E8B04B"/>
    <text x="33" y="54" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#12151C">Enter ⏎</text>
    <path d="M74 49 h22" stroke="#2FD6C3" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M90 43 l8 6 -8 6" fill="none" stroke="#2FD6C3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- window -->
    <g transform="translate(106,0)">
      <rect x="0" y="0" width="196" height="106" rx="8" fill="#012456" stroke="rgba(255,255,255,0.15)"/>
      <rect x="0" y="0" width="196" height="22" rx="8" fill="#0A1A38"/>
      <rect x="0" y="12" width="196" height="10" fill="#0A1A38"/>
      <text x="10" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8A93A6">Windows PowerShell</text>
      <circle cx="168" cy="11" r="3" fill="#5C6577"/><circle cx="180" cy="11" r="3" fill="#5C6577"/>
      <text x="10" y="46" font-family="Consolas, monospace" font-size="11" fill="#E8ECF4">Windows PowerShell</text>
      <text x="10" y="72" font-family="Consolas, monospace" font-size="11" fill="#E8ECF4">PS C:\Users\Ban&gt;</text>
      <rect x="118" y="63" width="7" height="12" fill="#2FD6C3"/>
    </g>
  </g>
</svg>
