<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 250" role="img" aria-label="Gallery — one line a day becomes a yearly journal">
  <title>Nhật ký mỗi ngày — một câu mỗi ngày thành sổ tay cả năm / One line a day becomes a yearly journal</title>
  <defs>
    <linearGradient id="gal-note-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C212C"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="248" rx="16" fill="url(#gal-note-tile)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- header -->
  <rect x="24" y="22" width="96" height="24" rx="4" fill="#E8B04B"/>
  <text x="72" y="39" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#12151C">NHẬT KÝ</text>
  <text x="134" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#E8ECF4">Một câu mỗi ngày — thành sổ tay cả năm</text>
  <text x="756" y="40" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic" fill="#5C6577">Your second brain grows daily</text>

  <!-- user bubble (right) -->
  <text x="756" y="72" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Bạn</text>
  <rect x="336" y="78" width="420" height="36" rx="10" fill="#2A3040"/>
  <text x="546" y="101" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">/daily-note hôm nay chốt được hợp đồng lớn 🎉</text>

  <!-- assistant bubble (left) -->
  <text x="24" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Trợ lý</text>
  <rect x="24" y="138" width="520" height="64" rx="10" fill="#1E2634" stroke="#E8B04B" stroke-opacity="0.35"/>
  <text x="40" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Đã ghi vào sổ ngày 05/07 ✅</text>
  <text x="40" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8A93A6">Tuần này của bạn: 2 hợp đồng chốt, 1 buổi chụp.</text>

  <!-- honesty footer -->
  <text x="756" y="234" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#5C6577">minh họa · illustration</text>
</svg>
