<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 250" role="img" aria-label="Gallery — the free tier runs 100% on your own machine">
  <title>Miễn phí — chạy 100% trên máy bạn, không tài khoản / Free tier — runs 100% on your machine, no account</title>
  <defs>
    <linearGradient id="gal-free-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C212C"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="248" rx="16" fill="url(#gal-free-tile)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- header — teal: the Free/$0 accent -->
  <rect x="24" y="22" width="108" height="24" rx="4" fill="#2FD6C3"/>
  <text x="78" y="39" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#12151C">MIỄN PHÍ · 0đ</text>
  <text x="146" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#E8ECF4">Không tài khoản — chạy 100% trên máy bạn</text>
  <text x="756" y="40" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic" fill="#5C6577">Free tier · fully local</text>

  <!-- user bubble (right) -->
  <text x="756" y="72" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Bạn</text>
  <rect x="316" y="78" width="440" height="36" rx="10" fill="#2A3040"/>
  <text x="536" y="101" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Máy tôi bình thường thôi, không có tài khoản gì hết</text>

  <!-- assistant bubble (left) — teal accent for the free engine -->
  <text x="24" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Trợ lý</text>
  <rect x="24" y="138" width="520" height="64" rx="10" fill="#1E2634" stroke="#2FD6C3" stroke-opacity="0.35"/>
  <text x="40" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Không sao — tôi chạy ngay trên máy của bạn.</text>
  <text x="40" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8A93A6">Trò chuyện, ghi nhớ, sổ tay — tất cả không cần mạng.</text>

  <!-- honesty footer -->
  <text x="756" y="234" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#5C6577">minh họa · illustration</text>
</svg>
