<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 250" role="img" aria-label="Gallery — ask in one line, get a real Excel file">
  <title>Làm file thật — Word/Excel/PowerPoint/PDF / Ask in one line — get a real Office file</title>
  <defs>
    <linearGradient id="gal-xls-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C212C"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="248" rx="16" fill="url(#gal-xls-tile)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- header -->
  <rect x="24" y="22" width="100" height="24" rx="4" fill="#E8B04B"/>
  <text x="74" y="39" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#12151C">FILE THẬT</text>
  <text x="138" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#E8ECF4">Nói một câu — nhận file Word/Excel thật</text>
  <text x="756" y="40" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic" fill="#5C6577">Real Office files, one ask</text>

  <!-- user bubble (right) -->
  <text x="756" y="72" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Bạn</text>
  <rect x="356" y="78" width="400" height="36" rx="10" fill="#2A3040"/>
  <text x="556" y="101" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Làm cho tôi file Excel theo dõi chi tiêu tháng 7</text>

  <!-- assistant bubble (left) with a file chip -->
  <text x="24" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Trợ lý</text>
  <rect x="24" y="138" width="500" height="72" rx="10" fill="#1E2634" stroke="#E8B04B" stroke-opacity="0.35"/>
  <text x="40" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Đây bạn ơi — có sẵn công thức tính tổng từng tuần:</text>
  <rect x="40" y="176" width="236" height="24" rx="4" fill="#2A3040" stroke="#E8B04B" stroke-opacity="0.5"/>
  <text x="52" y="193" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#E8B04B">📊 chi-tieu-thang-7.xlsx</text>

  <!-- honesty footer -->
  <text x="756" y="234" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#5C6577">minh họa · illustration</text>
</svg>
