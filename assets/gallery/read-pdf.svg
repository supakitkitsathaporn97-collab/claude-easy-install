<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 250" role="img" aria-label="Gallery — it reads any PDF you drop on it">
  <title>Đọc PDF — gửi file là nó đọc luôn / Drop any PDF on it — it reads it natively</title>
  <defs>
    <linearGradient id="gal-pdf-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C212C"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="248" rx="16" fill="url(#gal-pdf-tile)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- header: capability chip + title -->
  <rect x="24" y="22" width="92" height="24" rx="4" fill="#E8B04B"/>
  <text x="70" y="39" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#12151C">ĐỌC PDF</text>
  <text x="130" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#E8ECF4">Gửi file PDF, hợp đồng — nó đọc được luôn</text>
  <text x="756" y="40" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic" fill="#5C6577">Drop any PDF on it</text>

  <!-- user bubble (right) -->
  <text x="756" y="72" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Bạn</text>
  <rect x="336" y="78" width="420" height="36" rx="10" fill="#2A3040"/>
  <text x="546" y="101" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Đọc giúp tôi hợp đồng này với 📄 hop-dong-thue.pdf</text>

  <!-- assistant bubble (left) -->
  <text x="24" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Trợ lý</text>
  <rect x="24" y="138" width="500" height="64" rx="10" fill="#1E2634" stroke="#E8B04B" stroke-opacity="0.35"/>
  <text x="40" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Xong! Hợp đồng thuê 2 năm, cọc 2 tháng.</text>
  <text x="40" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8A93A6">Có 1 điểm nên xem lại: phạt hủy sớm ở mục 7.</text>

  <!-- honesty footer -->
  <text x="756" y="234" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#5C6577">minh họa · illustration</text>
</svg>
