<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 290" role="img" aria-label="Gallery — say remember and it never forgets">
  <title>Trí nhớ dài hạn — nói 'nhớ nhé' là nó nhớ mãi / Say "remember" — it never forgets</title>
  <defs>
    <linearGradient id="gal-mem-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C212C"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="288" rx="16" fill="url(#gal-mem-tile)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- header -->
  <rect x="24" y="22" width="96" height="24" rx="4" fill="#E8B04B"/>
  <text x="72" y="39" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#12151C">TRÍ NHỚ</text>
  <text x="134" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#E8ECF4">Nói "nhớ nhé" — nó nhớ mãi</text>
  <text x="756" y="40" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic" fill="#5C6577">It never forgets</text>

  <!-- user bubble (right) -->
  <text x="756" y="72" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Bạn</text>
  <rect x="366" y="78" width="390" height="36" rx="10" fill="#2A3040"/>
  <text x="561" y="101" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Nhớ nhé: chị Lan chỉ nhận hàng buổi sáng</text>

  <!-- assistant bubble (left) -->
  <rect x="24" y="126" width="150" height="34" rx="10" fill="#1E2634" stroke="#E8B04B" stroke-opacity="0.35"/>
  <text x="40" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Đã ghi nhớ ✅</text>

  <!-- time divider — the human beat of this card -->
  <line x1="120" y1="182" x2="330" y2="182" stroke="rgba(255,255,255,0.10)"/>
  <text x="390" y="187" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic" fill="#5C6577">một tuần sau · a week later</text>
  <line x1="450" y1="182" x2="660" y2="182" stroke="rgba(255,255,255,0.10)"/>

  <!-- assistant bubble, unprompted recall -->
  <text x="24" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Trợ lý</text>
  <rect x="24" y="218" width="520" height="36" rx="10" fill="#1E2634" stroke="#E8B04B" stroke-opacity="0.35"/>
  <text x="40" y="241" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Đơn chị Lan nè — tôi xếp giao 9h sáng, như chị ấy thích.</text>

  <!-- honesty footer -->
  <text x="756" y="274" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#5C6577">minh họa · illustration</text>
</svg>
