<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 290" role="img" aria-label="Gallery — it forges custom skills for your profession (photographer quote example)">
  <title>Kỹ năng riêng — nó tự tạo công cụ cho nghề của bạn / It forges skills for your profession</title>
  <defs>
    <linearGradient id="gal-forge-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C212C"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="288" rx="16" fill="url(#gal-forge-tile)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- header -->
  <rect x="24" y="22" width="140" height="24" rx="4" fill="#E8B04B"/>
  <text x="94" y="39" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#12151C">KỸ NĂNG RIÊNG</text>
  <text x="178" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#E8ECF4">Nó tự tạo công cụ cho nghề của bạn</text>
  <text x="756" y="40" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic" fill="#5C6577">Forged for a photographer</text>

  <!-- user bubble (right) -->
  <text x="756" y="72" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Bạn</text>
  <rect x="366" y="78" width="390" height="36" rx="10" fill="#2A3040"/>
  <text x="561" y="101" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Báo giá chụp cưới trọn gói 1 ngày ở Đà Lạt</text>

  <!-- assistant bubble (left) -->
  <text x="24" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5C6577">Trợ lý</text>
  <rect x="24" y="138" width="560" height="112" rx="10" fill="#1E2634" stroke="#E8B04B" stroke-opacity="0.35"/>
  <text x="40" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8A93A6">Dùng kỹ năng "làm báo giá" tôi tạo riêng cho bạn:</text>
  <text x="40" y="192" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#E8ECF4">Gói trọn ngày · 2 thợ ảnh · album 30 trang</text>
  <text x="40" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#E8B04B">18.500.000đ</text>
  <text x="40" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8A93A6">Gửi thẳng cho khách được luôn nhé?</text>

  <!-- honesty footer -->
  <text x="756" y="274" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#5C6577">minh họa · illustration</text>
</svg>
